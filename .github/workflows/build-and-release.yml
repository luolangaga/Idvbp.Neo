name: Build and Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Publish
        run: dotnet publish Idvbp.Neo/Idvbp.Neo.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Create NSIS installer script
        run: |
          @"
          OutFile "Idvbp.Neo-win-x64.exe"
          InstallDir "`$PROGRAMFILES\Idvbp.Neo"
          RequestExecutionLevel admin

          Section
            SetOutPath "`$INSTDIR"
            File /r "publish\*.*"
            CreateDirectory "`$SMPROGRAMS\Idvbp.Neo"
            CreateShortCut "`$SMPROGRAMS\Idvbp.Neo\Idvbp.Neo.lnk" "`$INSTDIR\Idvbp.Neo.exe"
            CreateShortCut "`$DESKTOP\Idvbp.Neo.lnk" "`$INSTDIR\Idvbp.Neo.exe"
            WriteUninstaller "`$INSTDIR\uninstall.exe"
          SectionEnd

          Section "Uninstall"
            RMDir /r "`$INSTDIR"
            Delete "`$SMPROGRAMS\Idvbp.Neo\Idvbp.Neo.lnk"
            RMDir "`$SMPROGRAMS\Idvbp.Neo"
            Delete "`$DESKTOP\Idvbp.Neo.lnk"
          SectionEnd
          "@ | Out-File -FilePath install.nsi -Encoding ASCII

      - name: Build installer
        run: makensis install.nsi

      - uses: actions/upload-artifact@v4
        with:
          name: Idvbp.Neo-win-x64
          path: Idvbp.Neo-win-x64.exe

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Publish
        run: dotnet publish Idvbp.Neo/Idvbp.Neo.csproj -c Release -r osx-arm64 --self-contained -p:PublishSingleFile=true -o publish

      - name: Create .app bundle
        run: |
          APP="Idvbp.Neo.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp -R publish/* "$APP/Contents/MacOS/"
          cat > "$APP/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Idvbp.Neo</string>
            <key>CFBundleName</key>
            <string>Idvbp.Neo</string>
            <key>CFBundleIdentifier</key>
            <string>com.idvbp.neo</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
          </dict>
          </plist>
          EOF

      - name: Create DMG
        run: |
          hdiutil create -volname "Idvbp.Neo" -srcfolder Idvbp.Neo.app -ov -format UDZO Idvbp.Neo-osx-arm64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: Idvbp.Neo-osx-arm64
          path: Idvbp.Neo-osx-arm64.dmg

  build-macos-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Publish
        run: dotnet publish Idvbp.Neo/Idvbp.Neo.csproj -c Release -r osx-x64 --self-contained -p:PublishSingleFile=true -o publish

      - name: Create .app bundle
        run: |
          APP="Idvbp.Neo.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp -R publish/* "$APP/Contents/MacOS/"
          cat > "$APP/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Idvbp.Neo</string>
            <key>CFBundleName</key>
            <string>Idvbp.Neo</string>
            <key>CFBundleIdentifier</key>
            <string>com.idvbp.neo</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
          </dict>
          </plist>
          EOF

      - name: Create DMG
        run: |
          hdiutil create -volname "Idvbp.Neo" -srcfolder Idvbp.Neo.app -ov -format UDZO Idvbp.Neo-osx-x64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: Idvbp.Neo-osx-x64
          path: Idvbp.Neo-osx-x64.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Publish
        run: dotnet publish Idvbp.Neo/Idvbp.Neo.csproj -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true -o publish

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp -R publish/* AppDir/usr/bin/
          cp AppDir/usr/bin/Idvbp.Neo AppDir/AppRun
          chmod +x AppDir/AppRun
          cat > AppDir/usr/share/applications/idvbp-neo.desktop << 'EOF'
          [Desktop Entry]
          Name=Idvbp.Neo
          Exec=Idvbp.Neo
          Type=Application
          Categories=Development;
          EOF
          # Add a placeholder icon (transparent PNG)
          # If you have an icon, replace this step
          cp AppDir/usr/bin/Idvbp.Neo AppDir/Idvbp.Neo.png 2>/dev/null || true

      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage AppDir Idvbp.Neo-linux-x64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: Idvbp.Neo-linux-x64
          path: Idvbp.Neo-linux-x64.AppImage

  release:
    if: github.event_name != 'pull_request'
    needs: [build-windows, build-macos-arm64, build-macos-x64, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: Idvbp.Neo-*
          merge-multiple: true
          path: artifacts

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          prerelease: true
          tag_name: v${{ github.run_number }}
          name: Pre-release v${{ github.run_number }}
