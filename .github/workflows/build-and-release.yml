name: Build and Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: zip
          - os: ubuntu-latest
            rid: linux-x64
            ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            ext: tar.gz
          - os: macos-latest
            rid: osx-x64
            ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: Idvbp.Neo.Frontend/pnpm-lock.yaml

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Build Frontend
        shell: bash
        run: |
          cd Idvbp.Neo.Frontend
          pnpm install
          pnpm build

      - name: Copy Frontend to wwwroot
        shell: bash
        run: |
          rm -rf Idvbp.Neo/wwwroot/*
          cp -r Idvbp.Neo.Frontend/dist/* Idvbp.Neo/wwwroot/

      - name: Publish
        run: dotnet publish Idvbp.Neo/Idvbp.Neo.csproj -c Release -r ${{ matrix.rid }} --self-contained -o publish

      - name: Package (Windows)
        if: matrix.ext == 'zip'
        run: Compress-Archive -Path publish\* -DestinationPath Idvbp.Neo-${{ matrix.rid }}.zip

      - name: Package (Unix)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: tar -czf Idvbp.Neo-${{ matrix.rid }}.tar.gz -C publish .

      - uses: actions/upload-artifact@v4
        with:
          name: Idvbp.Neo-${{ matrix.rid }}
          path: Idvbp.Neo-${{ matrix.rid }}.${{ matrix.ext }}

  release:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: Idvbp.Neo-*
          merge-multiple: true
          path: artifacts

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          prerelease: true
          tag_name: v${{ github.run_number }}
          name: Pre-release v${{ github.run_number }}
          body: |
            Automated pre-release build from commit `${{ github.sha }}`.
